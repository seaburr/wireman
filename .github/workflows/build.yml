name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package -- --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign app bundle and rebuild DMG
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "Signing $APP"
          codesign --deep --force --sign - "$APP"
          DMG=$(ls dist/*.dmg | head -1)
          rm "$DMG"
          hdiutil create -volname "Wireman" -srcfolder "$APP" -ov -format UDZO "$DMG"

      - uses: actions/upload-artifact@v4
        with:
          name: wireman-mac
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package -- --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: wireman-win
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

  # On main: overwrite the rolling "nightly" pre-release with fresh binaries
  release-nightly:
    if: github.ref == 'refs/heads/main'
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          make_latest: false
          body: |
            Automated build from `main` — commit ${{ github.sha }}

            > Not a stable release. Download the latest DMG or EXE below.
          files: |
            artifacts/wireman-mac/*.dmg
            artifacts/wireman-win/*.exe

  # On tagged releases, publish a proper stable GitHub Release
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/wireman-mac/*.dmg
            artifacts/wireman-win/*.exe
          generate_release_notes: true
