name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package -- --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign app bundle and rebuild DMG
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "Signing $APP"
          codesign --deep --force --sign - "$APP"
          DMG=$(ls dist/*.dmg | head -1)
          rm "$DMG"
          hdiutil create -volname "Wireman" -srcfolder "$APP" -ov -format UDZO "$DMG"

      - uses: actions/upload-artifact@v4
        with:
          name: wireman-mac
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package -- --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: wireman-win
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

  # On main: overwrite the rolling "nightly" pre-release with fresh binaries
  release-nightly:
    if: github.ref == 'refs/heads/main'
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Move the nightly tag to the current commit so source archives are fresh
      - name: Update nightly tag
        run: |
          git tag -f nightly ${{ github.sha }}
          git push origin -f refs/tags/nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Wipe stale assets so version-stamped filenames don't accumulate
      - name: Clear existing nightly assets
        run: |
          gh release view nightly --repo ${{ github.repository }} --json assets \
            --jq '.assets[].name' 2>/dev/null \
            | xargs -r -I {} gh release delete-asset nightly {} \
                --repo ${{ github.repository }} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          make_latest: false
          body: |
            Automated build from `main` — commit ${{ github.sha }}

            > Not a stable release. Download the latest DMG or EXE below.
          files: |
            artifacts/wireman-mac/*.dmg
            artifacts/wireman-win/*.exe

  # Keep only the 3 most recent pre-releases; delete anything older
  cleanup-old-nightlies:
    if: github.ref == 'refs/heads/main'
    needs: [release-nightly]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete pre-releases beyond the last 3
        run: |
          gh release list --repo ${{ github.repository }} --limit 100 \
            --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease)] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | xargs -r -I {} sh -c \
              'gh release delete "{}" --repo ${{ github.repository }} --yes \
               && git push origin :refs/tags/"{}" || true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # On tagged releases, publish a proper stable GitHub Release
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/wireman-mac/*.dmg
            artifacts/wireman-win/*.exe
          generate_release_notes: true
