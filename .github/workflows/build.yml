name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package -- --mac
        env:
          # Skip code signing — unsigned DMG, Gatekeeper will warn on first open
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: wireman-mac
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package -- --win --arch x64

      - uses: actions/upload-artifact@v4
        with:
          name: wireman-win
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

  # On tagged releases, publish artifacts to a GitHub Release
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/wireman-mac/*.dmg
            artifacts/wireman-win/*.exe
          generate_release_notes: true
